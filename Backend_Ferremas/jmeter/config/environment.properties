# Environment Configuration for JMeter Tests
# This file defines host, port, and scenario settings for load testing

# ==========================================
# HOST CONFIGURATION
# ==========================================
# For Docker execution, use container names (backend)
# For local execution, use localhost or 127.0.0.1
HOST=localhost
PORT=3000
BACKEND_URL=http://${HOST}:${PORT}

# Frontend (for browser-based tests if needed)
FRONTEND_HOST=localhost
FRONTEND_PORT=8000
FRONTEND_URL=http://${FRONTEND_HOST}:${FRONTEND_PORT}

# ==========================================
# SCENARIO CONFIGURATION
# ==========================================

# Smoke Test: Validation test
SMOKE_USERS=10
SMOKE_RAMPUP_SECONDS=30
SMOKE_HOLD_SECONDS=60
SMOKE_SHUTDOWN_SECONDS=10

# Load Test: Sustained load
LOAD_USERS=100
LOAD_RAMPUP_SECONDS=120
LOAD_HOLD_SECONDS=300
LOAD_SHUTDOWN_SECONDS=30

# Stress Test: Peak load
STRESS_USERS=500
STRESS_RAMPUP_SECONDS=180
STRESS_HOLD_SECONDS=180
STRESS_SHUTDOWN_SECONDS=60

# Resistencia Test: Long duration
RESISTENCIA_USERS=50
RESISTENCIA_RAMPUP_SECONDS=120
RESISTENCIA_HOLD_SECONDS=1800
RESISTENCIA_SHUTDOWN_SECONDS=30

# ==========================================
# TIMING CONFIGURATION
# ==========================================
# Connection timeout in milliseconds
CONNECTION_TIMEOUT=10000

# Response timeout in milliseconds
RESPONSE_TIMEOUT=30000

# ==========================================
# TEST DATA
# ==========================================
# Path to CSV files with test data (relative to testplans directory)
USUARIOS_CSV_PATH=../data/usuarios.csv
PRODUCTOS_CSV_PATH=../data/productos.csv

# ==========================================
# REPORTS
# ==========================================
# Report output directory
REPORTS_DIR=../reports

# Generate HTML report (true/false)
GENERATE_HTML_REPORT=true

# ==========================================
# LOGGING
# ==========================================
LOG_LEVEL=INFO
LOG_FILE=../reports/jmeter.log

# ==========================================
# ASSERTIONS
# ==========================================
# Expected HTTP response code
EXPECTED_HTTP_CODE=200

# Response time threshold (milliseconds) - for assertions
RESPONSE_TIME_THRESHOLD=5000
