# SonarQube Configuration for Ferremas Backend
# This file configures SonarQube Scanner to analyze backend code quality

# Project Identification
sonar.projectKey=ferremas-backend
sonar.projectName=Ferremas Backend
sonar.projectVersion=1.0.0

# Source Code Configuration
sonar.sources=src
sonar.tests=src

# Test File Patterns - Include all test types
sonar.test.inclusions=**/*.test.js,**/*.behavior.test.js,**/*.smoke.test.js,**/*.spec.js

# Coverage Configuration
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.js,**/*.spec.js,src/**/*.test.js

# Exclusions - Files and directories to ignore
sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/dist/**,\
  **/_informes/**,\
  **/uploads/**,\
  **/features/**,\
  **/jest.config.js,\
  **/jest.setup.js,\
  **/.env,\
  **/.env.example,\
  **/package-lock.json,\
  **/yarn.lock,\
  **/*.log,\
  **/migrations/**,\
  **/seeders/**,\
  **/templates/**,\
  **/__pycache__/**,\
  **/venv/**,\
  **/*.pyc

# Encoding
sonar.sourceEncoding=UTF-8

# Host and authentication (adjust if using non-default SonarQube setup)
# sonar.host.url=http://localhost:9000
# sonar.login=YOUR_TOKEN_HERE

# Language configuration
sonar.language=js

# Code analysis rules
sonar.javascript.node.maxFileSize=1000

# Performance tuning
sonar.sourceEncoding=UTF-8
# Custom quality gate rules (optional)
# sonar.qualitygate.wait=true

# CPD (Copy-Paste Detection)
sonar.cpd.exclusions=**/*.test.js,**/node_modules/**

# Verbose mode for debugging (set to false in production)
sonar.verbose=false
